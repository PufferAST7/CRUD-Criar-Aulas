<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gerenciamento de Aulas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head_extras %}{% endblock %}

</head>
<body>

    <!-- ============ NAVBAR (dentro da base) ============ -->
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid d-flex justify-content-between align-items-center">

            <!-- LOGO / TÍTULO -->
            <span class="navbar-brand">
                GERENCIAMENTO DE AULAS PRÁTICAS
            </span>

            <!-- BOTÃO HAMBÚRGUER -->
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarConteudo">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- LINKS DA NAVBAR -->
            <div class="collapse navbar-collapse" id="navbarConteudo">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link" href="{{url_for ('index')}}">Aulas</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{url_for ('criadores')}}">Sobre</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/" onclick="return confirm('Deseja realmente sair?');">Logout</a>
                        
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>


    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Arquivo JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
